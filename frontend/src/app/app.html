<div class="notes-management-container">
  <h2>Notes Management</h2>
  
  <form (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="title">Title:</label>
      <input type="text" id="title" name="title" [(ngModel)]="note.title" placeholder="Enter note title" required>
    </div>
    
    <div class="form-group">
      <label for="content">Content:</label>
      <textarea id="content" name="content" rows="5" [(ngModel)]="note.content" placeholder="Enter note content" required></textarea>
    </div>
    
    <button type="submit">Save Note</button>
  </form>
</div>
